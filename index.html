<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Habit Tracker" />
  <meta name="theme-color" content="#0f0f13" />
  <title>Sudheer's Habit Tracker</title>
  <meta name="description" content="Personal habit & goal tracker" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>" />
  <!-- iOS home-screen icon -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230f0f13'/><text y='.9em' font-size='75' x='10'>🎯</text></svg>" />
  <style>

/* ============================================================
   Sudheer's Habit Tracker — Styles
   ============================================================ */

:root {
  --bg: #0f0f13;
  --bg2: #1a1a24;
  --bg3: #22222e;
  --card: #1e1e2a;
  --card2: #252534;
  --border: #2e2e3e;
  --border2: #3a3a50;
  --text: #f0f0f5;
  --text2: #a0a0b8;
  --text3: #6b6b85;
  --accent: #7c6bf5;
  --accent2: #9d8ff7;
  --accent-glow: rgba(124, 107, 245, 0.25);
  --green: #10b981;
  --green-bg: rgba(16, 185, 129, 0.12);
  --yellow: #f59e0b;
  --yellow-bg: rgba(245, 158, 11, 0.12);
  --red: #ef4444;
  --red-bg: rgba(239, 68, 68, 0.12);
  --blue: #3b82f6;
  --blue-bg: rgba(59, 130, 246, 0.12);
  --cyan: #06b6d4;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --radius: 14px;
  --radius-sm: 8px;
  --transition: 0.18s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
  font-size: 15px;
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ============================================================
   Layout
   ============================================================ */

.app-shell {
  display: flex;
  min-height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 240px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  z-index: 100;
  transition: transform var(--transition);
}

.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}

.logo-mark {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 4px 12px var(--accent-glow);
}

.logo-text {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.3px;
  line-height: 1.2;
}

.logo-sub {
  font-size: 11px;
  color: var(--text3);
  font-weight: 400;
}

.sidebar-nav {
  flex: 1;
  padding: 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.nav-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text3);
  padding: 8px 8px 4px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--text2);
  font-size: 14px;
  font-weight: 500;
  transition: all var(--transition);
  border: 1px solid transparent;
  text-decoration: none;
  user-select: none;
}

.nav-item:hover {
  background: var(--bg3);
  color: var(--text);
}

.nav-item.active {
  background: var(--accent-glow);
  border-color: rgba(124, 107, 245, 0.3);
  color: var(--accent2);
}

.nav-icon { font-size: 17px; width: 20px; text-align: center; }

.sidebar-footer {
  padding: 16px;
  border-top: 1px solid var(--border);
}

.month-badge {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 12px;
  color: var(--text2);
  text-align: center;
}

.month-badge strong { color: var(--accent2); display: block; font-size: 14px; }

/* Main content */
.main-content {
  margin-left: 240px;
  flex: 1;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Mobile menu */
.mobile-header {
  display: none;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 99;
}

.hamburger {
  background: none; border: none;
  color: var(--text); cursor: pointer;
  font-size: 22px; padding: 4px;
}

/* ============================================================
   Views
   ============================================================ */

.view { display: none; }
.view.active { display: block; }

.view-header {
  padding: 32px 32px 0;
  border-bottom: 1px solid var(--border);
  padding-bottom: 24px;
}

.view-title {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}

.view-subtitle { color: var(--text2); font-size: 14px; }

.view-body { padding: 28px 32px; }

/* ============================================================
   Cards
   ============================================================ */

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
}

/* ============================================================
   Stat Cards (Dashboard top row)
   ============================================================ */

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  position: relative;
  overflow: hidden;
  transition: border-color var(--transition);
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--color, var(--accent));
  border-radius: var(--radius) var(--radius) 0 0;
}

.stat-card:hover { border-color: var(--border2); }

.stat-label {
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
  letter-spacing: 0.3px;
  margin-bottom: 8px;
}

.stat-value {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 4px;
  color: var(--color, var(--text));
}

.stat-sub {
  font-size: 12px;
  color: var(--text3);
}

.stat-icon {
  position: absolute;
  top: 16px; right: 16px;
  font-size: 24px;
  opacity: 0.3;
}

/* ============================================================
   Progress Bar
   ============================================================ */

.progress-bar-wrap {
  background: var(--bg3);
  border-radius: 100px;
  overflow: hidden;
  height: 6px;
  margin-top: 8px;
}

.progress-bar-fill {
  height: 100%;
  background: var(--color, var(--accent));
  border-radius: 100px;
  transition: width 0.5s ease;
}

/* ============================================================
   Dashboard Grids
   ============================================================ */

.dashboard-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}

.dashboard-grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

/* ============================================================
   Bar Chart (SVG)
   ============================================================ */

.chart-wrap {
  position: relative;
  width: 100%;
}

.chart-svg { width: 100%; overflow: visible; }

.chart-bar { transition: opacity var(--transition); cursor: pointer; }
.chart-bar:hover { opacity: 0.8; }

.chart-label {
  fill: var(--text3);
  font-size: 11px;
  font-family: inherit;
}

.chart-tooltip {
  position: absolute;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  font-size: 12px;
  pointer-events: none;
  display: none;
  z-index: 10;
}

/* ============================================================
   Calendar Heatmap
   ============================================================ */

.heatmap-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.heatmap-day-label {
  font-size: 10px;
  text-align: center;
  color: var(--text3);
  padding-bottom: 4px;
  font-weight: 600;
}

.heatmap-cell {
  aspect-ratio: 1;
  border-radius: 5px;
  background: var(--bg3);
  position: relative;
  cursor: pointer;
  transition: transform var(--transition);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  color: var(--text3);
  font-weight: 500;
}

.heatmap-cell:hover { transform: scale(1.15); }
.heatmap-cell.empty { background: transparent; cursor: default; }
.heatmap-cell.empty:hover { transform: none; }

.heatmap-cell[data-rate="0"]  { background: var(--bg3); }
.heatmap-cell[data-rate="1"]  { background: #166534; color: #fff; }
.heatmap-cell[data-rate="2"]  { background: #15803d; color: #fff; }
.heatmap-cell[data-rate="3"]  { background: #16a34a; color: #fff; }
.heatmap-cell[data-rate="4"]  { background: #22c55e; color: #fff; }
.heatmap-cell[data-rate="5"]  { background: #4ade80; color: #052e16; }

.heatmap-legend {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 12px;
  font-size: 11px;
  color: var(--text3);
}

.legend-box {
  width: 14px; height: 14px; border-radius: 3px;
}

/* ============================================================
   Top Habits List
   ============================================================ */

.top-habits-list { display: flex; flex-direction: column; gap: 8px; }

.top-habit-item {
  display: flex;
  align-items: center;
  gap: 10px;
}

.top-habit-icon {
  font-size: 18px;
  width: 32px; height: 32px;
  background: var(--bg3);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.top-habit-info { flex: 1; min-width: 0; }

.top-habit-name {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 3px;
}

.top-habit-bar-wrap {
  background: var(--bg3);
  border-radius: 100px;
  height: 4px;
}

.top-habit-bar {
  height: 4px;
  border-radius: 100px;
  background: var(--accent);
}

.top-habit-pct {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent2);
  flex-shrink: 0;
}

/* ============================================================
   Date Navigator
   ============================================================ */

.date-nav {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}

.nav-btn {
  width: 36px; height: 36px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  color: var(--text);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}

.nav-btn:hover { background: var(--bg3); border-color: var(--border2); }

.date-display {
  flex: 1;
  text-align: center;
}

.date-display-main {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.date-display-sub {
  font-size: 12px;
  color: var(--text3);
}

.today-btn {
  padding: 7px 16px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity var(--transition);
  font-family: inherit;
}

.today-btn:hover { opacity: 0.85; }

/* ============================================================
   Daily Completion Ring
   ============================================================ */

.completion-summary {
  display: flex;
  align-items: center;
  gap: 24px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 24px;
}

.ring-wrap { position: relative; flex-shrink: 0; }

.ring-svg { width: 80px; height: 80px; }

.ring-track { fill: none; stroke: var(--bg3); stroke-width: 7; }
.ring-fill  {
  fill: none;
  stroke: var(--accent);
  stroke-width: 7;
  stroke-linecap: round;
  stroke-dasharray: 201;
  stroke-dashoffset: 201;
  transform: rotate(-90deg);
  transform-origin: 50% 50%;
  transition: stroke-dashoffset 0.6s ease;
}

.ring-text {
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  font-weight: 800;
  color: var(--accent2);
}

.completion-details { flex: 1; }

.completion-big {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 2px;
}

.completion-sub { color: var(--text2); font-size: 13px; margin-bottom: 12px; }

.block-pills { display: flex; flex-wrap: wrap; gap: 6px; }

.block-pill {
  padding: 4px 10px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 600;
  border: 1px solid;
}

/* ============================================================
   Habit Time Blocks
   ============================================================ */

.time-block {
  margin-bottom: 20px;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
}

.time-block-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
}

.block-title-wrap { display: flex; align-items: center; gap: 10px; }

.block-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.block-name { font-size: 14px; font-weight: 700; }
.block-time { font-size: 12px; color: var(--text3); margin-top: 1px; }

.block-count {
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
}

.block-chevron {
  font-size: 12px;
  color: var(--text3);
  transition: transform var(--transition);
}

.time-block.collapsed .block-chevron { transform: rotate(-90deg); }

.habit-list {
  border-top: 1px solid var(--border);
  overflow: hidden;
}

.time-block.collapsed .habit-list { display: none; }

.habit-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--transition);
  user-select: none;
}

.habit-row:last-child { border-bottom: none; }
.habit-row:hover { background: var(--bg3); }

.habit-checkbox {
  width: 22px; height: 22px;
  border-radius: 6px;
  border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all var(--transition);
  font-size: 13px;
  background: transparent;
}

.habit-row.done .habit-checkbox {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.habit-emoji { font-size: 18px; flex-shrink: 0; }
.habit-label { flex: 1; font-size: 14px; }

.habit-row.done .habit-label {
  text-decoration: line-through;
  color: var(--text3);
}

.habit-streak {
  font-size: 11px;
  color: var(--text3);
  background: var(--bg3);
  border-radius: 100px;
  padding: 2px 7px;
}

/* ============================================================
   Weekly View
   ============================================================ */

.week-nav {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}

.week-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.weekly-habit-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: all var(--transition);
  user-select: none;
}

.weekly-habit-card:hover { border-color: var(--border2); background: var(--card2); }

.weekly-habit-card.done {
  border-color: rgba(16, 185, 129, 0.4);
  background: rgba(16, 185, 129, 0.06);
}

.weekly-icon-wrap {
  width: 48px; height: 48px;
  background: var(--bg3);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
  transition: background var(--transition);
}

.weekly-habit-card.done .weekly-icon-wrap { background: rgba(16, 185, 129, 0.15); }

.weekly-habit-info { flex: 1; }
.weekly-habit-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.weekly-habit-day  { font-size: 12px; color: var(--text3); }

.weekly-check {
  width: 28px; height: 28px;
  border-radius: 8px;
  border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
  transition: all var(--transition);
}

.weekly-habit-card.done .weekly-check {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}

.week-stats-bar {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 24px;
}

.week-pct {
  font-size: 36px;
  font-weight: 800;
  color: var(--green);
  flex-shrink: 0;
}

.week-detail { flex: 1; }
.week-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; }

/* ============================================================
   Monthly View
   ============================================================ */

.monthly-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.monthly-category-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
  margin: 20px 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.monthly-category-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.monthly-goal-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: all var(--transition);
  user-select: none;
}

.monthly-goal-card:hover { border-color: var(--border2); background: var(--card2); }

.monthly-goal-card.done {
  border-color: rgba(124, 107, 245, 0.4);
  background: rgba(124, 107, 245, 0.06);
}

.monthly-icon {
  width: 44px; height: 44px;
  background: var(--bg3);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.monthly-goal-card.done .monthly-icon { background: rgba(124, 107, 245, 0.15); }

.monthly-goal-info { flex: 1; }
.monthly-goal-name { font-size: 14px; font-weight: 600; }

.monthly-check {
  width: 28px; height: 28px;
  border-radius: 8px;
  border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
  transition: all var(--transition);
}

.monthly-goal-card.done .monthly-check {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.month-progress-summary {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 24px;
}

/* ============================================================
   Streak badge
   ============================================================ */

.streak-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: linear-gradient(135deg, #f59e0b, #ef4444);
  border-radius: 100px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 700;
  color: #fff;
}

/* ============================================================
   Overlay for mobile sidebar
   ============================================================ */

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 99;
}

/* ============================================================
   Responsive
   ============================================================ */

@media (max-width: 900px) {
  .sidebar {
    transform: translateX(-100%);
  }

  .sidebar.open {
    transform: translateX(0);

// ============================================================
// Password Protection
// ============================================================
(function() {
  const AUTH_KEY   = 'sht_auth_v1';
  const CORRECT_PW = 'sud##0810';

  function isAuthed() {
    try { return localStorage.getItem(AUTH_KEY) === '1'; } catch(e) { return false; }
  }

  function setAuthed() {
    try { localStorage.setItem(AUTH_KEY, '1'); } catch(e) {}
  }

  function buildPwScreen() {
    const el = document.createElement('div');
    el.id = 'pw-screen';
    el.innerHTML = `
      <div class="pw-card">
        <div class="pw-logo">🎯</div>
        <div class="pw-title">Sudheer's Habit Tracker</div>
        <div class="pw-sub">Enter your password to continue</div>
        <div class="pw-input-wrap">
          <input class="pw-input" id="pwInput" type="password"
            placeholder="Password" autocomplete="current-password"
            autocapitalize="none" spellcheck="false"/>
          <button class="pw-eye" id="pwEye" tabindex="-1">👁</button>
        </div>
        <button class="pw-btn" id="pwBtn">Unlock</button>
        <div class="pw-error" id="pwError"></div>
        <div class="pw-footer">Your data is saved locally on this device</div>
      </div>`;
    document.body.appendChild(el);

    const input = el.querySelector('#pwInput');
    const btn   = el.querySelector('#pwBtn');
    const eye   = el.querySelector('#pwEye');
    const err   = el.querySelector('#pwError');

    eye.addEventListener('click', function() {
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      eye.textContent = show ? '🙈' : '👁';
      input.focus();
    });

    function attempt() {
      const val = input.value;
      if (val === CORRECT_PW) {
        setAuthed();
        el.style.transition = 'opacity 0.4s';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 400);
      } else {
        err.textContent = 'Incorrect password. Please try again.';
        input.classList.add('shake');
        input.value = '';
        setTimeout(() => input.classList.remove('shake'), 500);
        input.focus();
      }
    }

    btn.addEventListener('click', attempt);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') attempt();
    });

    // Auto-focus after small delay (iOS fix)
    setTimeout(() => input.focus(), 100);
  }

  // Show password screen or skip if already authenticated
  document.addEventListener('DOMContentLoaded', function() {
    if (!isAuthed()) {
      buildPwScreen();
    }
  }, { once: true });
})();

// ============================================================
// Date helpers
// ============================================================

function dateKey(year, month, day) {
  return `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

function weekKey(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 4 - (d.getDay()||7));
  const yearStart = new Date(d.getFullYear(),0,1);
  const weekNo = Math.ceil((((d-yearStart)/86400000)+1)/7);
  return `${d.getFullYear()}-W${String(weekNo).padStart(2,'0')}`;
}

function monthKey(year, month) {
  return `${year}-${String(month).padStart(2,'0')}`;
}

function daysInMonth(year, month) {
  return new Date(year, month, 0).getDate();
}

function today() {
  const d = new Date();
  return { year: d.getFullYear(), month: d.getMonth()+1, day: d.getDate() };
}

function formatDate(year, month, day) {
  return new Date(year, month-1, day).toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

function completionRate(habits, completed) {
  if (!habits || habits.length === 0) return 0;
  const done = habits.filter(h => completed && completed[h.id]).length;
  return Math.round((done / habits.length) * 100);
}

function getDayCompletionRate(dailyData, year, month, day) {
  const key = dateKey(year, month, day);
  const dayData = dailyData[key];
  if (!dayData) return null;
  const done = DAILY_HABITS.filter(h => dayData[h.id]).length;
  return Math.round((done / DAILY_HABITS.length) * 100);
}

function getMonthStats(dailyData, year, month) {
  const days = daysInMonth(year, month);
  let totalRate = 0, trackedDays = 0;
  const dailyRates = [];
  for (let d = 1; d <= days; d++) {
    const key = dateKey(year, month, d);
    if (dailyData[key]) {
      const rate = getDayCompletionRate(dailyData, year, month, d);
      totalRate += rate;
      trackedDays++;
      dailyRates.push({ day: d, rate });
    } else {
      dailyRates.push({ day: d, rate: null });
    }
  }
  return {
    overall: trackedDays > 0 ? Math.round(totalRate / trackedDays) : 0,
    trackedDays,
    dailyRates,
  };
}

function renderBarChart(dailyRates) {
  const W = 500, H = 140, padL = 30, padB = 22, barW = Math.max(4, Math.floor((W - padL) / dailyRates.length) - 2);
  const maxRate = 100;

  const bars = dailyRates.map((d, i) => {
    if (d.rate === null) return '';
    const x = padL + i * ((W - padL) / dailyRates.length) + 1;
    const barH = Math.max(2, (d.rate / maxRate) * (H - padB - 8));
    const y = H - padB - barH;
    const col = d.rate >= 80 ? '#4ade80' : d.rate >= 50 ? '#7c6bf5' : d.rate >= 30 ? '#f59e0b' : '#ef4444';
    return `<rect class="chart-bar" x="${x}" y="${y}" width="${barW}" height="${barH}" rx="3" fill="${col}" opacity="0.85">
      <title>Day ${d.day}: ${d.rate}%</title>
    </rect>`;
  }).join('');

  // X axis labels (every 5 days)
  const xLabels = dailyRates.filter(d => d.day % 5 === 0).map(d => {
    const x = padL + (d.day - 1) * ((W - padL) / dailyRates.length) + barW / 2;
    return `<text class="chart-label" x="${x}" y="${H - 6}" text-anchor="middle">${d.day}</text>`;
  }).join('');

  // Y axis labels
  const yLabels = [0, 25, 50, 75, 100].map(v => {
    const y = H - padB - (v / maxRate) * (H - padB - 8);
    return `<text class="chart-label" x="${padL - 5}" y="${y + 4}" text-anchor="end">${v}</text>
    <line x1="${padL}" y1="${y}" x2="${W}" y2="${y}" stroke="var(--border)" stroke-width="1" opacity="0.5"/>`;
  }).join('');

  return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" style="height:${H}px">
    ${yLabels}
    ${bars}
    ${xLabels}
  </svg>`;
}

function renderHeatmap(dailyData, year, month) {
  const days = daysInMonth(year, month);
  const firstDay = new Date(year, month - 1, 1).getDay(); // 0=Sun
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const headers = dayNames.map(d => `<div class="heatmap-day-label">${d}</div>`).join('');
  const empties = Array.from({length: firstDay}, () => `<div class="heatmap-cell empty"></div>`).join('');

  const cells = [];
  for (let d = 1; d <= days; d++) {
    const rate = getDayCompletionRate(dailyData, year, month, d);
    let tier = '0', tooltip = `Day ${d}: No data`;
    if (rate !== null) {
      if (rate >= 90) tier = '5';
      else if (rate >= 70) tier = '4';
      else if (rate >= 50) tier = '3';
      else if (rate >= 30) tier = '2';
      else tier = '1';
      tooltip = `Day ${d}: ${rate}%`;
    }
    const isToday = (new Date().getDate() === d && new Date().getMonth() + 1 === month && new Date().getFullYear() === year);
    const style = isToday ? 'outline: 2px solid var(--accent); outline-offset: 1px;' : '';
    cells.push(`<div class="heatmap-cell" data-rate="${rate !== null ? tier : '0'}" title="${tooltip}" style="${style}">${d}</div>`);
  }

  return `<div class="heatmap-grid">${headers}${empties}${cells.join('')}</div>`;
}

function computeTopHabits(dailyData, year, month) {
  const counts = {};
  DAILY_HABITS.forEach(h => { counts[h.id] = 0; });
  let tracked = 0;

  const days = daysInMonth(year, month);
  for (let d = 1; d <= days; d++) {
    const key = dateKey(year, month, d);
    if (dailyData[key]) {
      tracked++;
      DAILY_HABITS.forEach(h => {
        if (dailyData[key][h.id]) counts[h.id]++;
      });
    }
  }

  if (tracked === 0) return DAILY_HABITS.slice(0, 7).map(h => ({ ...h, pct: 0 }));

  return DAILY_HABITS
    .map(h => ({ ...h, pct: Math.round((counts[h.id] / tracked) * 100) }))
    .sort((a, b) => b.pct - a.pct)
    .slice(0, 7);
}

function renderHabitRow(habit, isDone) {
  return `
    <div class="habit-row ${isDone ? 'done' : ''}" data-id="${habit.id}">

      <span class="habit-emoji">${habit.icon}</span>
      <span class="habit-label">${habit.label}</span>
    </div>
  `;
}

function calcStreak(dailyData, year, month, day) {
  let streak = 0;
  let d = new Date(year, month - 1, day);

  while (true) {
    const k = dateKey(d.getFullYear(), d.getMonth() + 1, d.getDate());
    const data = dailyData[k];
    if (!data) break;
    const done = DAILY_HABITS.filter(h => data[h.id]).length;
    if (done === 0) break;
    streak++;
    d.setDate(d.getDate() - 1);
    if (streak > 365) break;
  }
  return streak;
}

};

function getWeekRange(wk) {
  // ISO week to date range
  const [yr, wNum] = wk.split('-W').map(Number);
  // Jan 4th is always in week 1 of its year
  const jan4 = new Date(yr, 0, 4);
  const startOfWeek1 = new Date(jan4);
  startOfWeek1.setDate(jan4.getDate() - (jan4.getDay() || 7) + 1);
  const start = new Date(startOfWeek1);
  start.setDate(startOfWeek1.getDate() + (wNum - 1) * 7);
  const end = new Date(start);
  end.setDate(start.getDate() + 6);
  const fmt = d => d.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' });
  return `${fmt(start)} – ${fmt(end)}`;
}

function getGoalArea(areaId) {
  return GOAL_AREAS.find(a => a.id === areaId) || { label: areaId, icon: '🎯', color: '#7c6bf5' };
}

function goalProgress(goal) {
  const filled = goal.steps.filter(s => s && s.trim()).length;
  if (filled === 0) return 0;
  const done = goal.stepsCompleted.filter((c, i) => c && goal.steps[i] && goal.steps[i].trim()).length;
  return Math.round((done / filled) * 100);
}

function statusLabel(s) {
  if (s === 'completed')   return { text: '✅ Completed',   color: '#10b981', bg: 'rgba(16,185,129,0.12)' };
  if (s === 'in_progress') return { text: '⏳ In Progress', color: '#f59e0b', bg: 'rgba(245,158,11,0.12)' };
  return                          { text: '○ Not Started',  color: '#6b6b85', bg: 'rgba(107,107,133,0.10)' };
}

function formatDeadline(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }); }
  catch { return d; }
}

function daysLeft(d) {
  if (!d) return null;
  const diff = new Date(d) - new Date();
  const days = Math.ceil(diff / 86400000);
  if (days < 0)  return { text: `${Math.abs(days)}d overdue`, color: '#ef4444' };
  if (days === 0) return { text: 'Due today!',  color: '#f59e0b' };
  if (days <= 30) return { text: `${days}d left`, color: '#f59e0b' };
  const months = Math.round(days / 30);
  if (months < 12) return { text: `${months}mo left`, color: '#a0a0b8' };
  return { text: `${Math.round(months/12)}yr left`, color: '#a0a0b8' };
}

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:12px;color:var(--text3)">Progress</span>
          <span style="font-size:13px;font-weight:700;color:${area.color}">${prog}%</span>

          </div>
          ${filledSteps.map(s => `
            <div class="step-check-row ${s.done ? 'done' : ''}" data-goal-idx="${goalIdx}" data-step-idx="${s.idx}">
              <div class="step-check">${s.done ? '✓' : ''}</div>
              <span class="step-label">${s.text}</span>
            </div>
          `).join('')}
        </div>
      ` : ''}
    </div>
  `;
}

// ============================================================
// SVG Ring
// ============================================================

function renderRing(pct, color) {
  const r = 32, circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  return `<svg width="80" height="80" viewBox="0 0 70 70">
    <circle fill="none" stroke="var(--bg3)" stroke-width="7" cx="35" cy="35" r="${r}"/>
    <circle fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round"
      cx="35" cy="35" r="${r}"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
      transform="rotate(-90 35 35)" style="transition:stroke-dashoffset 0.5s ease"/>
  </svg>`;
}

// ============================================================
// Add / Edit Modal
// ============================================================

function openGoalModal(container, state, goalIdx, callbacks) {
  const isEdit = goalIdx !== null;
  const g = isEdit ? state.data.goals[goalIdx] : {
    id: 'goal_' + Date.now(),
    area: 'finances', title: '', reward: '', status: 'not_started',
    deadline: '', steps: Array(8).fill(''), stepsCompleted: Array(8).fill(false),
  };

  container.querySelector('#modalTitle').textContent = isEdit ? 'Edit Goal' : 'Add New Goal';

  const areaOptions = GOAL_AREAS.map(a =>
    `<option value="${a.id}" ${g.area === a.id ? 'selected' : ''}>${a.icon} ${a.label}</option>`
  ).join('');

  const stepsHTML = g.steps.map((s, i) => `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:12px;color:var(--text3);width:16px;text-align:center">${i+1}</span>
      <input class="modal-input step-input" type="text" placeholder="Step ${i+1}" value="${s || ''}" data-step="${i}" />
    </div>
  `).join('');

  container.querySelector('#modalBody').innerHTML = `
    <div class="modal-field">
      <label class="modal-label">Area of Life</label>
      <select class="modal-input" id="mArea">${areaOptions}</select>
    </div>
    <div class="modal-field">
      <label class="modal-label">Goal Title</label>
      <input class="modal-input" id="mTitle" type="text" placeholder="e.g. Became a Millioner" value="${g.title || ''}"/>
    </div>
    <div class="modal-field">
      <label class="modal-label">Reward 🎁</label>
      <input class="modal-input" id="mReward" type="text" placeholder="e.g. Go on a weekend getaway" value="${g.reward || ''}"/>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="modal-field">
        <label class="modal-label">Status</label>
        <select class="modal-input" id="mStatus">
          <option value="not_started" ${g.status==='not_started'?'selected':''}>○ Not Started</option>
          <option value="in_progress" ${g.status==='in_progress'?'selected':''}>⏳ In Progress</option>
          <option value="completed"   ${g.status==='completed'?'selected':''}>✅ Completed</option>
        </select>
      </div>
      <div class="modal-field">
        <label class="modal-label">Deadline</label>
        <input class="modal-input" id="mDeadline" type="date" value="${g.deadline || ''}"/>
      </div>
    </div>
    <div class="modal-field">
      <label class="modal-label">Steps to Reach Goal</label>
      <div id="stepsWrap">${stepsHTML}</div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
      <button class="modal-cancel-btn" id="modalCancel">Cancel</button>
      <button class="modal-save-btn" id="modalSave">${isEdit ? 'Save Changes' : 'Add Goal'}</button>
    </div>
  `;

  container.querySelector('#goalModalOverlay').style.display = 'flex';

  container.querySelector('#modalCancel').addEventListener('click', () => closeModal(container));

  container.querySelector('#modalSave').addEventListener('click', () => {
    const newSteps = Array.from(container.querySelectorAll('.step-input')).map(i => i.value.trim());
    const updated = {
      ...g,
      area:     container.querySelector('#mArea').value,
      title:    container.querySelector('#mTitle').value.trim() || 'Untitled Goal',
      reward:   container.querySelector('#mReward').value.trim(),
      status:   container.querySelector('#mStatus').value,
      deadline: container.querySelector('#mDeadline').value,
      steps:    newSteps,
      stepsCompleted: isEdit ? g.stepsCompleted : Array(8).fill(false),
    };
    if (isEdit) {
      state.data.goals[goalIdx] = updated;
    } else {
      state.data.goals.push(updated);
    }
    callbacks.save();
    closeModal(container);
    callbacks.rerender();
  });
}

function closeModal(container) {
  container.querySelector('#goalModalOverlay').style.display = 'none';
}


// === APP ===

// ============================================================
// Sudheer's Habit Tracker — Main App Controller
// ============================================================
// ============================================================
// State
// ============================================================

const t = today();

const state = {
  activeView: 'dashboard',
  data: loadData(),
  currentDay: { year: t.year, month: t.month, day: t.day },
  currentWeekKey: weekKey(new Date()),
  currentMonthKey: monthKey(t.year, t.month),
  currentMonth: { year: t.year, month: t.month },
};

// ============================================================
// View Management
// ============================================================

const views = document.querySelectorAll('.view');
const navItems = document.querySelectorAll('.nav-item');

function switchView(viewName) {
  state.activeView = viewName;

  views.forEach(v => v.classList.remove('active'));
  navItems.forEach(n => n.classList.remove('active'));

  document.getElementById(`view-${viewName}`)?.classList.add('active');
  document.querySelector(`.nav-item[data-view="${viewName}"]`)?.classList.add('active');

  renderCurrentView();
  closeSidebar();
}

function renderCurrentView() {
  switch (state.activeView) {
    case 'dashboard':
      renderDashboard(document.getElementById('view-dashboard'), state);
      break;
    case 'daily':
      renderDaily(
        document.getElementById('view-daily'), state,
        onToggle, onNavigate
      );
      break;
    case 'weekly':
      renderWeekly(
        document.getElementById('view-weekly'), state,
        onToggle, onNavigate
      );
      break;
    case 'monthly':
      renderMonthly(
        document.getElementById('view-monthly'), state,
        onToggle, onNavigate
      );
      break;
    case 'goals':
      renderGoals(
        document.getElementById('view-goals'), state,
        {
          save: () => saveData(state.data),
          rerender: () => renderCurrentView(),
        }
      );
      break;
  }
}

// ============================================================
// Toggle Habit / Goal
// ============================================================

function onToggle(type, id, key) {
  if (type === 'daily') {
    if (!state.data.daily[key]) state.data.daily[key] = {};
    state.data.daily[key][id] = !state.data.daily[key][id];
  } else if (type === 'weekly') {
    if (!state.data.weekly[key]) state.data.weekly[key] = {};
    state.data.weekly[key][id] = !state.data.weekly[key][id];
  } else if (type === 'monthly') {
    if (!state.data.monthly[key]) state.data.monthly[key] = {};
    state.data.monthly[key][id] = !state.data.monthly[key][id];
  }

  saveData(state.data);
  renderCurrentView();
  showToast(state.data[type]?.[key]?.[id] ? '✅ Marked as done!' : '↩️ Marked as incomplete');
}

// ============================================================
// Navigation (day / week / month)
// ============================================================

function onNavigate(unit, delta) {
  if (unit === 'today') {
    const t2 = today();
    state.currentDay = { year: t2.year, month: t2.month, day: t2.day };

  } else if (unit === 'day') {
    const { year, month, day } = state.currentDay;
    const d = new Date(year, month - 1, day + delta);
    state.currentDay = { year: d.getFullYear(), month: d.getMonth() + 1, day: d.getDate() };

  } else if (unit === 'week') {
    const [yr, wn] = state.currentWeekKey.split('-W').map(Number);
    const d = new Date(yr, 0, 4); // Jan 4 = week 1
    d.setDate(d.getDate() - (d.getDay() || 7) + 1 + (wn - 1 + delta) * 7);
    state.currentWeekKey = weekKey(d);

  } else if (unit === 'month') {
    const [yr, mo] = state.currentMonthKey.split('-').map(Number);
    let nm = mo + delta, ny = yr;
    if (nm > 12) { nm = 1; ny++; }
    if (nm < 1)  { nm = 12; ny--; }
    state.currentMonthKey = monthKey(ny, nm);
    state.currentMonth = { year: ny, month: nm };
  }

  renderCurrentView();
}

// ============================================================
// Toast
// ============================================================

let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
}

// ============================================================
// Sidebar (mobile)
// ============================================================

function openSidebar() {
  document.querySelector('.sidebar').classList.add('open');
  document.querySelector('.sidebar-overlay').classList.add('open');
}

function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  document.querySelector('.sidebar-overlay').classList.remove('open');
}

// ============================================================
// Init
// ============================================================

document.addEventListener('DOMContentLoaded', () => {
  // Nav item click
  navItems.forEach(item => {
    item.addEventListener('click', () => switchView(item.dataset.view));
  });

  // Mobile hamburger
  document.querySelector('.hamburger')?.addEventListener('click', openSidebar);
  document.querySelector('.sidebar-overlay')?.addEventListener('click', closeSidebar);

  // Sidebar footer month badge
  const now = new Date();
  const badge = document.querySelector('.month-badge');
  if (badge) {
    badge.innerHTML = `
      <strong>${now.toLocaleString('en-IN', { month: 'long' })} ${now.getFullYear()}</strong>
      ${now.toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric' })}
    `;
  }

  // Initial render
  switchView('dashboard');
});

  
  </script>
